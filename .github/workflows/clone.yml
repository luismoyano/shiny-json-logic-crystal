name: GitHub Clone Count Update Everyday

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch clone traffic
        run: |
          curl --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/traffic/clones \
            > clone.json

      - name: Download previous count from Gist
        run: |
          curl -f https://gist.githubusercontent.com/${{ github.actor }}/${{ secrets.GIST_ID }}/raw/clone.json > clone_before.json || cp clone.json clone_before.json
          if ! grep -q '"clones"' clone_before.json; then
            cp clone.json clone_before.json
          fi

      - name: Compute accumulated count
        run: |
          curl https://raw.githubusercontent.com/MShawon/github-clone-count-badge/master/main.py > main.py
          python3 main.py

      - name: Update Gist with latest count
        run: |
          content=$(sed -e 's/\\/\\\\/g' -e 's/\t/\\t/g' -e 's/"/\\"/g' -e 's/\r//g' "clone.json" | sed -E ':a;N;$!ba;s/\r{0,1}\n/\\n/g')
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"files": {"clone.json": {"content": "'"$content"'"}}}' \
            https://api.github.com/gists/${{ secrets.GIST_ID }} > /dev/null
